<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT Generator Pro - Admin</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --dark-bg: #030a16;
        }

        body {
            background: var(--dark-bg);
            background-image: radial-gradient(circle at center, #0a192f 0%, #030a16 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .glass-card {
            width: 95%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.1);
        }

        .ht-logo {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
            margin-bottom: 5px;
        }

        .title-script {
            font-family: 'Brush Script MT', cursive;
            font-size: 2.2rem;
            color: var(--neon-green);
            margin: 0;
        }

        .input-key {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            margin-top: 20px;
            outline: none;
        }

        /* LÍNEA DE RESULTADO */
        #result-area {
            margin-top: 25px;
            display: none;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .output-line {
            width: 100%;
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn-glow {
            width: 100%;
            padding: 18px;
            background: #28a745; /* Verde corporativo */
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn-whatsapp {
            width: 100%;
            padding: 15px;
            background: #25d366;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-top: 10px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="ht-logo">HT</div>
        <div class="title-script">Generador de Llave</div>
        <div style="color:var(--neon-blue); font-size: 0.9rem; letter-spacing: 2px;">CALCULADORA DE BOLSILLO</div>

        <input type="text" id="id-cliente" class="input-key" placeholder="Pega el ID del cliente aquí">

        <button class="btn-glow" onclick="generarTodo()">GENERAR LICENCIA PRO</button>

        <div id="result-area">
            <p style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">LLAVE COPIADA:</p>
            <div id="output-key" class="output-line"></div>
            
            <a id="wa-link" href="#" target="_blank" class="btn-whatsapp">
                ENVIAR POR WHATSAPP
            </a>
        </div>

        <div class="footer">
            HACKTECHNOLOGY ADMIN SUITE v2.0
        </div>
    </div>

    <script>
        function generarTodo() {
            const id = document.getElementById('id-cliente').value.trim();
            if(!id) return alert("Por favor, ingresa el ID del cliente");

            // 1. Generar Llave
            const llave = id.toUpperCase() + "-PRO";
            
            // 2. Calcular fecha de vencimiento (30 días desde hoy)
            const hoy = new Date();
            hoy.setDate(hoy.getDate() + 30);
            const fechaVenc = hoy.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });

            // 3. Mostrar en pantalla
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('output-key').innerText = llave;

            // 4. Copiar al portapapeles automáticamente
            navigator.clipboard.writeText(llave);

            // 5. Configurar enlace de WhatsApp con el mensaje completo
            const mensaje = encodeURIComponent(
                `🔑 *HACKTECHNOLOGY LICENCIA PRO*\n\n` +
                `Hola, aquí tienes tu llave de activación:\n` +
                `👉 *${llave}*\n\n` +
                `📅 *Vence el:* ${fechaVenc}\n` +
                `¡Gracias por preferir HackTechnology!`
            );
            
            document.getElementById('wa-link').href = `https://wa.me/?text=${mensaje}`;
        }
    </script>
</body>
</html>
